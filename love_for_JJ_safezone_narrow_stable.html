<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For JJ ❤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;}
canvas{position:fixed;inset:0;width:100vw;height:100vh;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(10px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;transition:1s ease;}
.overlay.hidden{opacity:0;pointer-events:none}
.start-title{font-size:clamp(42px,7vw,82px);color:#fff;margin-bottom:20px;text-shadow:0 0 10px #ff4f9a,0 0 25px #ff4f9a,0 0 48px #ff4f9a;}
.start-subtitle{color:#ffd6e8;font-size:clamp(18px,2vw,28px);margin-bottom:40px;}
button{border:none;border-radius:999px;padding:16px 42px;cursor:pointer;font-size:22px;color:#fff;background:linear-gradient(135deg,#ff4f9a,#ff85b8);box-shadow:0 0 24px #ff4f9a,0 0 46px rgba(255,79,154,.85);transition:.25s;}
button:hover{transform:scale(1.08)}
.main{position:fixed;width:100%;top:7%;text-align:center;z-index:10;pointer-events:none;padding:0 30px;}
.main h1{font-size:clamp(42px,7vw,88px);color:#fff;letter-spacing:2px;margin-bottom:16px;text-shadow:0 0 12px #ff4f9a,0 0 26px #ff4f9a,0 0 46px #ff4f9a;}
.main p{font-size:clamp(19px,2vw,30px);color:#fff;line-height:1.45;max-width:980px;margin:0 auto;text-shadow:0 0 10px #ff8fab,0 0 22px #ff4f9a;}
.bottom{position:fixed;bottom:18px;width:100%;text-align:center;color:rgba(255,255,255,.52);font-size:14px;z-index:10;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="main"><h1 id="title">To JJ ❤</h1><p id="typing"></p></div>
<div class="bottom">Press F11 for best experience</div>
<div class="overlay" id="overlay"><div class="start-title">给你一个小惊喜</div><div class="start-subtitle">点击开始进入属于你的小宇宙</div><button id="startBtn">Start ❤</button></div>
<audio id="bgm" src="music.mp3" loop></audio>
<script>
const GIRL_NAME="JJ";
const typingTexts = [
    "见字如晤，展信舒颜",
    "谢谢你的出现，温暖了我的世界",
    "我喜欢和你相处的每一刻",
    "哪怕只是简单的闲聊",
    "或者安静的陪伴",
    "都让我觉得安稳又宝贵",
    "愿你永远被温柔以待",
    "你好像总是在照顾所有人",
    "可其实你也是需要被好好照顾的小宝宝",
    "认真生活的人，总会闪闪发光",
    "你努力时候的样子，真的很好看",
    "前路花团锦簇，星辰大海",
    "世界应该奖励每一个温柔又坚定的人",
    "希望你永远不会失去热爱生活的能力",
    "有时候会觉得，你像一个永远充满能量的小太阳",
    "原来真的会有人，让平淡的日子也开始发光",
    "我其实一直觉得，遇见你是一件很幸运的事情",
    "月色与雪色之间，你是第三种颜色",
    "希望未来很多很多开心的瞬间，都有你在",
    "有时候会觉得",
    "喜欢一个人，原来真的会忍不住想把所有温柔都留给她",
    "以后也要一直闪闪发光呀，小坏宝",
    "祝愿你所愿即所得，实现所有藏在心中的梦想和期待",
    "以后也要开开心心的呀"
];
const floatingMessages = [
    "好好吃饭",
    "别太累啦",
    "天天开心",
    "顺顺利利",
    "记得休息",
    "慢慢发光",
    "永远幸运",
    "天天有糖",
    "一直闪闪发光",
    "小坏宝",
    "做个好梦",
    "每天都要开心",
    "愿你被爱着",
    "Love You",
    "❤"
];
const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d"),typing=document.getElementById("typing"),title=document.getElementById("title");
let W,H,DPR,stars=[],heartParticles=[],floatingTexts=[],fireworks=[],rose=[],halo=[],orbitHearts=[];
let floatingFade=1;
let started=false,roseMode=false,finale=false,roseAlpha=0,loveAlpha=0,lastFrame=0;
let typingSeen=new Set(),floatingSeen=new Set();
function rand(a,b){return Math.random()*(b-a)+a}
function resize(){DPR=Math.min(window.devicePixelRatio||1,1.25);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+"px";canvas.style.height=H+"px";ctx.setTransform(DPR,0,0,DPR,0,0);buildScene()}
addEventListener("resize",resize);
function heartBoundary(t){const x=16*Math.pow(Math.sin(t),3);const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);return{x,y}}
function filledHeartPoint(){const t=Math.random()*Math.PI*2,b=heartBoundary(t),f=Math.sqrt(Math.random());return{x:b.x*f,y:b.y*f}}
function rotateY(p,a){const c=Math.cos(a),s=Math.sin(a);return{x:p.x*c+p.z*s,y:p.y,z:-p.x*s+p.z*c}}
function project(p){const camera=720,scale=camera/(camera+p.z);return{x:W/2+p.x*scale,y:H/2+58+p.y*scale,s:scale}}
function petalPoint(theta,layer,ox,oy,oz,spread){const r=spread*Math.sin(2.6*theta)*(0.35+layer*0.75),curl=Math.sin(theta*3+layer*2)*10;return{x:ox+Math.cos(theta)*r+curl,y:oy+Math.sin(theta)*r*.55-layer*26,z:oz+Math.sin(theta*1.7)*r*.36+layer*20}}
function makeRoseCluster(cx,cy,cz,size,tilt){const pts=[];for(let i=0;i<520;i++){const layer=Math.random(),theta=Math.random()*Math.PI*2,p=petalPoint(theta,layer,cx,cy,cz,size);p.x+=rand(-2,2);p.y+=rand(-2,2);p.z+=rand(-2,2);const ct=Math.cos(tilt),st=Math.sin(tilt),y=p.y-cy,z=p.z-cz;p.y=cy+y*ct-z*st;p.z=cz+y*st+z*ct;pts.push({...p,r:rand(1,2.25),color:["#ff2d75","#ff4f9a","#ff6fae","#ff9ec4","#ffd1df","#fff1f6"][Math.floor(rand(0,6))],a:rand(.46,.94)})}return pts}
function makeStem(x1,y1,z1,x2,y2,z2,count,colors){const pts=[];for(let i=0;i<count;i++){const t=i/(count-1);pts.push({x:x1+(x2-x1)*t+rand(-2,2),y:y1+(y2-y1)*t+rand(-2,2),z:z1+(z2-z1)*t+rand(-2,2),r:rand(.8,1.7),color:colors[Math.floor(rand(0,colors.length))],a:rand(.55,.88)})}return pts}
function buildRoseScene(){rose=[];halo=[];orbitHearts=[];const sc=Math.min(W,H)/720*1.08;rose.push(...makeRoseCluster(-95*sc,-95*sc,20*sc,70*sc,-.25));rose.push(...makeRoseCluster(-20*sc,-125*sc,0,78*sc,-.15));rose.push(...makeRoseCluster(72*sc,-100*sc,-15*sc,68*sc,-.28));rose.push(...makeRoseCluster(25*sc,-48*sc,25*sc,55*sc,-.12));rose.push(...makeStem(-95*sc,-45*sc,20*sc,-15*sc,160*sc,10*sc,130,["#f5d2dc","#ffe6ee","#bfe8c5"]));rose.push(...makeStem(-20*sc,-65*sc,0,5*sc,165*sc,5*sc,130,["#f5d2dc","#ffe6ee","#bfe8c5"]));rose.push(...makeStem(72*sc,-50*sc,-15*sc,18*sc,165*sc,5*sc,130,["#f5d2dc","#ffe6ee","#bfe8c5"]));rose.push(...makeStem(25*sc,-5*sc,25*sc,10*sc,155*sc,5*sc,95,["#f5d2dc","#ffe6ee","#bfe8c5"]));for(let i=0;i<250;i++){const side=Math.random()<.5?-1:1;rose.push({x:side*rand(25,130)*sc,y:rand(35,150)*sc,z:rand(-40,40)*sc,r:rand(1,2.2),color:["#ff6fae","#ffd1df","#b7f7c1","#fff1f6"][Math.floor(rand(0,4))],a:rand(.45,.82)})}for(let i=0;i<620;i++){const t=i/620*Math.PI*2,j=rand(-2.2,2.2);halo.push({t,x:Math.cos(t)*(260*sc+j),y:Math.sin(t)*(74*sc+j*.25)+35*sc,z:Math.sin(t)*(58*sc),r:rand(.9,2),color:["#fff","#ffe6ee","#ffd1df","#ff9ec4"][Math.floor(rand(0,4))],a:rand(.55,.92)})}for(let i=0;i<18;i++)orbitHearts.push({t:rand(0,Math.PI*2),speed:rand(.0025,.0055),size:rand(11,17),a:rand(.45,.9)})}
function buildScene(){stars=[];heartParticles=[];floatingTexts=[];fireworks=[];roseAlpha=0;loveAlpha=0;for(let i=0;i<130;i++)stars.push({x:rand(0,W),y:rand(0,H),r:rand(.35,1.5),a:rand(0,Math.PI*2)});const count=Math.min(1500,Math.floor(W*H/520)),scale=Math.min(W,H)/34;for(let i=0;i<count;i++){const edge=Math.random()<.2,p=edge?heartBoundary(rand(0,Math.PI*2)):filledHeartPoint();heartParticles.push({bx:p.x,by:p.y,x:W/2+p.x*scale,y:H/2+68-p.y*scale,r:rand(.85,1.75),color:["#ff4f9a","#ff6fae","#ff9ec4","#ffd1df","#ffffff"][Math.floor(rand(0,5))],alpha:rand(.48,.92),tw:rand(0,Math.PI*2),drift:rand(0,Math.PI*2),vx:0,vy:0,life:0})}for(let i=0;i<floatingMessages.length;i++){
        const side=Math.floor(rand(0,4));
        const size=rand(20,28);
        const speed=rand(0.55,1.05);
        let x,y,vx,vy;

        if(side===0){
            x=rand(40,Math.max(80,W-260)); y=rand(30,80);
            vx=rand(-0.55,0.55); vy=speed;
        }else if(side===1){
            x=rand(40,Math.max(80,W-260)); y=H-rand(45,95);
            vx=rand(-0.55,0.55); vy=-speed;
        }else if(side===2){
            x=rand(25,85); y=rand(120,Math.max(140,H-120));
            vx=speed; vy=rand(-0.55,0.55);
        }else{
            x=W-rand(180,260); y=rand(120,Math.max(140,H-120));
            vx=-speed; vy=rand(-0.55,0.55);
        }

        floatingTexts.push({
            text:floatingMessages[i],
            x,y,vx,vy,
            size,
            alpha:0,
            targetAlpha:0.84,
            width:0
        });
    }buildRoseScene()}
function particle(x,y,r,color,alpha=1){ctx.globalAlpha=Math.max(0,Math.min(1,alpha));ctx.beginPath();ctx.fillStyle=color;ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
function makeFirework(cx,cy,count=90){const colors=["#ff4f9a","#ff85b8","#ffd1df","#fff","#ff2d75"];for(let i=0;i<count;i++){const a=rand(0,Math.PI*2),s=rand(2.2,6.2);fireworks.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(68,105),size:rand(1,2.4),color:colors[Math.floor(rand(0,colors.length))]})}}
function triggerFinale(){if(finale)return;finale=true;title.innerText="For JJ ❤";typing.innerText="这是最后一个小惊喜";makeFirework(W/2,H/2,135);makeFirework(W/2-220,H/2-65,75);makeFirework(W/2+220,H/2-65,75);for(const p of heartParticles){const a=rand(0,Math.PI*2),s=rand(3.6,8);p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=78}setTimeout(()=>{roseMode=true;typing.innerText="把一整捧玫瑰，送给世界第一努力小女孩"},1450);setTimeout(()=>{loveAlpha=.01},4550)}
function checkFinale(){if(!finale&&typingSeen.size>=typingTexts.length&&floatingSeen.size>=floatingMessages.length)setTimeout(triggerFinale,900)}
function drawStars(){for(const s of stars){s.a+=.012;particle(s.x,s.y,s.r,"#fff",.14+Math.abs(Math.sin(s.a))*.5)}}
function drawHeart(time){const scale=Math.min(W,H)/34,pulse=1+Math.sin(time*2.15)*.035;ctx.shadowBlur=9;ctx.shadowColor="#ff4f9a";for(const p of heartParticles){if(p.life>0){p.x+=p.vx;p.y+=p.vy;p.vy+=.035;p.life--;particle(p.x,p.y,p.r*1.25,p.color,p.life/78)}else{p.tw+=.035;p.drift+=.012;p.x=W/2+p.bx*scale*pulse+Math.cos(p.drift)*1.3;p.y=H/2+68-p.by*scale*pulse+Math.sin(p.drift)*1.3;particle(p.x,p.y,p.r,p.color,p.alpha+Math.sin(p.tw)*.16)}}ctx.shadowBlur=0}
function drawRotatingRose(time){roseAlpha=Math.min(1,roseAlpha+.018);const alpha=roseAlpha,angle=time*.28,breathe=1+Math.sin(time*2)*.018,all=[];for(const p of rose){const q=rotateY({x:p.x*breathe,y:p.y*breathe,z:p.z*breathe},angle),pr=project(q);all.push({...p,px:pr.x,py:pr.y,depth:q.z,scale:pr.s})}for(const h of halo){const q=rotateY({x:h.x,y:h.y,z:h.z},angle),pr=project(q);all.push({...h,px:pr.x,py:pr.y,depth:q.z,scale:pr.s,halo:true})}all.sort((a,b)=>a.depth-b.depth);ctx.globalAlpha=alpha;ctx.shadowBlur=8;ctx.shadowColor="#ff9ec4";for(const p of all)particle(p.px,p.py,p.r*p.scale*(p.halo?1.12:1),p.color,p.a);ctx.shadowBlur=0;const sc=Math.min(W,H)/720;ctx.save();ctx.translate(W/2,H/2+58);ctx.rotate(Math.sin(angle)*.11);ctx.scale(1,.28);ctx.beginPath();ctx.strokeStyle=`rgba(255,236,242,${.88*alpha})`;ctx.lineWidth=2.2;ctx.shadowBlur=18;ctx.shadowColor="#ffd1df";ctx.arc(0,125*sc,280*sc,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.textAlign="center";for(const o of orbitHearts){o.t+=o.speed;const x=Math.cos(o.t)*280*sc,y=Math.sin(o.t)*76*sc+35*sc,z=Math.sin(o.t)*58*sc,q=rotateY({x,y,z},angle),pr=project(q);ctx.font=`${o.size}px Arial`;ctx.fillStyle=`rgba(255,130,178,${o.a*alpha})`;ctx.shadowBlur=10;ctx.shadowColor="#ff4f9a";ctx.fillText("❤",pr.x,pr.y)}ctx.shadowBlur=0;ctx.textAlign="start";ctx.globalAlpha=1;if(loveAlpha>0){
        typing.style.opacity="1";typing.innerText="把一整捧玫瑰，送给世界第一努力小女孩";
    }

    if(loveAlpha>0){loveAlpha=Math.min(1,loveAlpha+.018);ctx.save();ctx.globalAlpha=loveAlpha;ctx.textAlign="center";ctx.font=`bold ${Math.min(W,H)/15}px "PingFang SC","Microsoft YaHei",Arial`;ctx.fillStyle="#ffd6e8";ctx.shadowBlur=28;ctx.shadowColor="#ff4f9a";ctx.fillText("Love You",W/2,H/2+260*sc);ctx.restore()}}
function drawFireworks(){for(const fw of fireworks){fw.x+=fw.vx;fw.y+=fw.vy;fw.vy+=.035;fw.life--;ctx.shadowBlur=10;ctx.shadowColor=fw.color;if(fw.life>0)particle(fw.x,fw.y,fw.size,fw.color,Math.max(fw.life/100,0));ctx.shadowBlur=0}fireworks=fireworks.filter(f=>f.life>0)}
function drawFloating(){
    if(roseMode){
        floatingFade=Math.max(0,floatingFade-0.012);
    }else{
        floatingFade=Math.min(1,floatingFade+0.01);
    }
    if(floatingFade<=0.02) return;

    for(const t of floatingTexts){
        ctx.font=`bold ${t.size}px "Microsoft YaHei",Arial`;
        if(t.width===0){
            t.width=ctx.measureText(t.text).width;
        }

        t.alpha=Math.min(t.targetAlpha,t.alpha+0.012);
        t.x+=t.vx;
        t.y+=t.vy;

        const margin=14;
        const maxX=Math.max(margin,W-t.width-margin);
        const maxY=H-margin;

        // Screen edge bounce
        if(t.x<margin){
            t.x=margin;
            t.vx=Math.abs(t.vx);
        }
        if(t.x>maxX){
            t.x=maxX;
            t.vx=-Math.abs(t.vx);
        }
        if(t.y<t.size+margin){
            t.y=t.size+margin;
            t.vy=Math.abs(t.vy);
        }
        if(t.y>maxY){
            t.y=maxY;
            t.vy=-Math.abs(t.vy);
        }

        // Keep movement speed stable after any bounce.
        const baseSpeed=Math.max(0.45,Math.min(1.12,Math.sqrt(t.vx*t.vx+t.vy*t.vy)||0.8));
        const baseLen=Math.sqrt(t.vx*t.vx+t.vy*t.vy)||1;
        t.vx=t.vx/baseLen*baseSpeed;
        t.vy=t.vy/baseLen*baseSpeed;

        // Safe zone around "To JJ" and main typing message
        // Narrower X range so floating texts still have room on the sides.
        const safeLeft=W*0.30;
        const safeRight=W*0.70;
        const safeTop=0;
        const safeBottom=H*0.32;

        if(
            t.x+t.width > safeLeft &&
            t.x < safeRight &&
            t.y > safeTop &&
            t.y < safeBottom
        ){
            const speed=Math.max(0.45,Math.sqrt(t.vx*t.vx+t.vy*t.vy));
            const textCenter=t.x+t.width/2;
            const safeCenter=(safeLeft+safeRight)/2;

            // Bounce away from the safe zone without increasing speed.
            if(textCenter < safeCenter){
                t.vx=-Math.abs(t.vx || speed);
                t.x=safeLeft-t.width-2;
            }else{
                t.vx=Math.abs(t.vx || speed);
                t.x=safeRight+2;
            }

            // Normalize velocity so repeated bounces never accelerate.
            const len=Math.sqrt(t.vx*t.vx+t.vy*t.vy) || 1;
            t.vx=t.vx/len*speed;
            t.vy=t.vy/len*speed;
        }

        floatingSeen.add(t.text);
        checkFinale();

        ctx.fillStyle=`rgba(255,255,255,${t.alpha*floatingFade})`;
        ctx.shadowBlur=10;
        ctx.shadowColor="#ff4f9a";
        ctx.fillText(t.text,t.x,t.y);
        ctx.shadowBlur=0;
    }
}
function draw(timestamp){if(timestamp-lastFrame<16){requestAnimationFrame(draw);return}lastFrame=timestamp;ctx.clearRect(0,0,W,H);const time=timestamp/1000;drawStars();roseMode?drawRotatingRose(time):drawHeart(time);drawFireworks();drawFloating();requestAnimationFrame(draw)}
function getHoldTime(line){
    const longPauseLines = [
        "前路花团锦簇，星辰大海",
        "月色与雪色之间，你是第三种颜色",
        "我其实一直觉得，遇见你是一件很幸运的事情",
        "祝愿你所愿即所得，实现所有藏在心中的梦想和期待",
        "以后也要一直闪闪发光呀，小坏宝"
    ];

    if(longPauseLines.includes(line)) return 3200;
    if(line.length >= 24) return 2800;
    return 2000;
}

async function fadeOutTyping(){
    typing.style.opacity="0";
    await new Promise(r=>setTimeout(r,700));
    typing.innerText="";
    typing.style.opacity="1";
    await new Promise(r=>setTimeout(r,60));
}

async function typeLoop(){
    let idx=0;
    while(true){
        if(finale){
            await new Promise(r=>setTimeout(r,1000));
            continue;
        }

        const line=typingTexts[idx%typingTexts.length];
        typingSeen.add(line);
        checkFinale();

        typing.style.opacity="1";

        for(let i=1;i<=line.length;i++){
            if(finale) break;
            typing.innerText=line.slice(0,i);
            await new Promise(r=>setTimeout(r,105));
        }

        await new Promise(r=>setTimeout(r,getHoldTime(line)));

        if(!finale){
            await fadeOutTyping();
        }

        idx++;
    }
}

resize();requestAnimationFrame(draw);
document.getElementById("startBtn").addEventListener("click",async()=>{document.getElementById("overlay").classList.add("hidden");const music=document.getElementById("bgm");try{music.volume=.8;await music.play()}catch(e){alert("请确认 music.mp3 与 html 在同一个文件夹")}if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});if(!started){started=true;typeLoop()}});
</script>
</body>
</html>
